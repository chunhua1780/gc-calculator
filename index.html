<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GhostChat — 入口</title>
  <style>
    html,body{height:100%;margin:0;font-family:Helvetica,Arial,sans-serif;background:#faf8fc}
    .gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FBE9F0 0%, #E7E0F9 100%);}
    .card{width:320px;max-width:92%;background:#fff;border-radius:18px;padding:22px;box-shadow:0 12px 36px rgba(120,90,140,.14);text-align:center}
    .title{font-size:20px;font-weight:700;color:#5B5470;margin-bottom:8px}
    .desc{font-size:13px;color:#9C93B4;margin-bottom:18px}
    .pin{width:100%;padding:12px;border-radius:12px;border:1px solid #eee;font-size:18px;text-align:center;letter-spacing:6px;margin-bottom:12px}
    .btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF8FAE,#E8729A);color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .hint{height:18px;color:#E8607A;font-weight:600;margin-top:10px;opacity:0;transition:opacity .2s}
    .hint.show{opacity:1}
    .footer{margin-top:14px;font-size:12px;color:#C9C0DD}
  </style>
</head>
<body>
  <div id="gate" class="gate" role="dialog" aria-modal="true">
    <div class="card" role="document">
      <div class="title">请输入访问密码</div>
      <div class="desc">这是应用内测入口。输入密码后进入聊天界面。</div>
      <input id="pin" class="pin" type="password" inputmode="numeric" maxlength="8" placeholder="• • • •" aria-label="pin" />
      <button id="enter" class="btn">进入</button>
      <div id="hint" class="hint">密码不对，请重试</div>
      <div class="footer">初始密码：1234（仅用于内测）</div>
    </div>
  </div>

  <script>
    (function(){
      // Simple client-side gate: PIN = 1234
      const PIN = '1234';
      const gate = document.getElementById('gate');
      const pinInput = document.getElementById('pin');
      const btn = document.getElementById('enter');
      const hint = document.getElementById('hint');

      function success() {
        try { localStorage.setItem('gc_authenticated', '1'); } catch(e){}
        // Redirect to the (existing) chat web page inside repo
        // We intentionally load the ghostchat-push/chat entry (if present) to keep chat core unchanged
        window.location.href = './ghostchat-push/index.html';
      }

      function fail() {
        hint.classList.add('show');
        pinInput.classList.add('shake');
        setTimeout(()=>hint.classList.remove('show'), 1500);
      }

      btn.addEventListener('click', ()=>{
        const val = (pinInput.value||'').trim();
        if(val === PIN) success(); else fail();
      });

      pinInput.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') { btn.click(); }
      });

      // If already authenticated in this browser session, go straight in
      try {
        if(localStorage.getItem('gc_authenticated') === '1') {
          success();
        }
      } catch(e){}

      // Disable any existing forms that might try to perform web-login to remote servers
      document.addEventListener('submit', function(ev){
        ev.preventDefault();
        // show hint if user tried to submit any hidden form
        hint.textContent = '已禁用远程登录，使用本地密码进入';
        hint.classList.add('show');
        setTimeout(()=>hint.classList.remove('show'),1500);
      }, true);

      // Accessibility: focus input
      pinInput.focus();
    })();
  </script>
</body>
</html>
